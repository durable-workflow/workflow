name: build

on:
  push:
    branches: [ master, v2 ]
  pull_request:
    branches: [ master, v2 ]

jobs:
  build:

    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql
        env:
          MYSQL_ROOT_PASSWORD: password
        ports:
        - 3306:3306

      postgres:
        image: postgres
        env:
          POSTGRES_USER: root
          POSTGRES_PASSWORD: password
          POSTGRES_DB: testbench
        ports:
        - 5432:5432

      redis:
        image: redis
        ports:
        - 6379:6379

    steps:
    - uses: actions/checkout@v3
      with:
          fetch-depth: 10

    - name: Validate composer.json and composer.lock
      run: composer validate --strict

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Check coding style via ECS
      run: vendor/bin/ecs check

    - name: Run static analysis via PHPStan
      run: vendor/bin/phpstan analyse src tests

    - name: Export GitHub Actions test defaults
      run: |
        echo "APP_KEY=base64:i3g6f+dV8FfsIkcxqd7gbiPn2oXk5r00sTmdD6V5utI=" >> "$GITHUB_ENV"
        echo "DB_HOST=127.0.0.1" >> "$GITHUB_ENV"
        echo "DB_DATABASE=testbench" >> "$GITHUB_ENV"
        echo "DB_USERNAME=root" >> "$GITHUB_ENV"
        echo "DB_PASSWORD=password" >> "$GITHUB_ENV"
        echo "QUEUE_FAILED_DRIVER=null" >> "$GITHUB_ENV"
        echo "REDIS_HOST=127.0.0.1" >> "$GITHUB_ENV"
        echo "REDIS_PASSWORD=" >> "$GITHUB_ENV"
        echo "REDIS_PORT=${{ job.services.redis.ports[6379] }}" >> "$GITHUB_ENV"

    - name: Create databases
      run: |
        touch testbench.sqlite
        mysql -e 'CREATE DATABASE testbench' -h127.0.0.1 -uroot -ppassword -P ${{ job.services.mysql.ports[3306] }}

    # --debug prints each test name as it starts so when the suite stalls
    # the hang point is visible in the step log instead of hidden behind
    # the 60m timeout. Currently chasing a stall around tests 882-913 that
    # only reproduces in CI (runs 24635883692 and 24637564241). Drop --debug
    # when the cluster tracked under #427 / the post-#429 MySQL flake is
    # resolved and MySQL has been consistently green.
    - name: Run test suite (MySQL)
      id: mysql_suite
      timeout-minutes: 65
      run: timeout --foreground 60m vendor/bin/phpunit --testdox --debug --testsuite feature
      env:
        DB_CONNECTION: mysql
        DB_PORT: ${{ job.services.mysql.ports[3306] }}
        QUEUE_CONNECTION: redis
        XDEBUG_MODE: off

    # PostgreSQL suite is currently non-blocking while #427 (TD-064: multi-DB
    # support workstream) is open — MySQL is the primary gate. --debug prints
    # each test name as it starts so when the suite stalls in CI the hang
    # point is visible in the step log instead of hidden behind the 60m
    # timeout. Drop continue-on-error (and optionally --debug) when #427 lands.
    - name: Run test suite (PostgreSQL)
      id: pgsql_suite
      continue-on-error: true
      timeout-minutes: 65
      run: timeout --foreground 60m vendor/bin/phpunit --testdox --debug --testsuite feature
      env:
        DB_CONNECTION: pgsql
        DB_PORT: ${{ job.services.postgres.ports[5432] }}
        QUEUE_CONNECTION: redis
        XDEBUG_MODE: off
        # libpq honors PGOPTIONS on every connection. Bounds keep a runaway
        # query or lock wait from consuming the entire 60m step budget:
        #   statement_timeout - any single statement > 2m fails loudly
        #   lock_timeout      - any lock wait > 30s fails loudly
        #   idle_in_transaction_session_timeout - abandoned tx > 60s ends
        # Each limit is well above legitimate migrate:fresh / query cost in
        # this suite but well below the step budget, so CI surfaces the
        # hang point instead of hiding it. Drop alongside continue-on-error
        # when #427 closes if they are no longer needed as a safety net.
        PGOPTIONS: "-c statement_timeout=120000 -c lock_timeout=30000 -c idle_in_transaction_session_timeout=60000"

    - name: Upload laravel.log if tests fail
      if: failure() || steps.mysql_suite.outcome == 'failure' || steps.pgsql_suite.outcome == 'failure'
      uses: actions/upload-artifact@v4
      with:
        name: laravel-log
        path: vendor/orchestra/testbench-core/laravel/storage/logs/laravel.log

    - name: Code Coverage
      run: |
        vendor/bin/phpunit --testdox --coverage-clover=coverage.xml --testsuite unit
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: testbench.sqlite
        QUEUE_CONNECTION: sync
        XDEBUG_MODE: coverage

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
